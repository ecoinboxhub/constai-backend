services:
  - type: web
    name: constai-backend
    env: python
    root: .
    build_command: pip install -U pip && pip install -r requirements.txt
    start_command: gunicorn -w 2 -k uvicorn.workers.UvicornWorker app.main:app --chdir backend --bind 0.0.0.0:$PORT
    plan: free
    health_check_path: /health