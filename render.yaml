services:
  - type: web
    name: constai-backend
    env: python
    root: .
    build_command: pip install -U pip && pip install -r requirements.txt
    start_command: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    plan: starter  # Upgraded to 2GB RAM from free tier's 512MB
    health_check_path: /health
    health_check_timeout: 30  # Allow 30s startup before health check
    env_vars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"