services:
  - type: web
    name: constai-backend
    env: python
    build_command: pip install -U pip && pip install -r requirements-prod.txt
    start_command: uvicorn app.main:app --app-dir backend --host 0.0.0.0 --port $PORT
    root: .
    plan: free
    instances: 1
    health_check_path: /health
